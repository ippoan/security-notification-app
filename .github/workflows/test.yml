name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    uses: ippoan/ci-workflows/.github/workflows/frontend-ci.yml@main
    with:
      has_tests: true
      typecheck_command: 'npx tsc --noEmit'
      post_install_script: 'npx wrangler types'
      test_command: 'npx vitest run --coverage'
    secrets: inherit
